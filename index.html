<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>나의 습관 트래커</title>
<style id="eureka-style">
.eureka-fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: #1a1a1a; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 100; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
.eureka-fab:active { transform: scale(0.92); }
.eureka-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200; align-items: flex-end; justify-content: center; }
.eureka-overlay.open { display: flex; }
.eureka-sheet { background: #fff; border-radius: 24px 24px 0 0; padding: 20px 20px 36px; width: 100%; max-width: 480px; }
.eureka-sheet-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.eureka-sheet-title { font-size: 17px; font-weight: 600; color: #1a1a1a; flex: 1; }
.eureka-close { background: #f0f0f0; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 16px; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center; }
.eureka-input { width: 100%; border: 1.5px solid #e0e0e0; border-radius: 14px; padding: 12px 14px; font-size: 15px; color: #1a1a1a; outline: none; font-family: inherit; resize: none; line-height: 1.6; background: #fafafa; }
.eureka-input:focus { border-color: #1a1a1a; background: #fff; }
.eureka-input::placeholder { color: #bbb; }
.eureka-save-btn { margin-top: 10px; width: 100%; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
.eureka-save-btn:active { opacity: 0.8; }

.eureka-list-section { margin-bottom: 1.5rem; }
.eureka-item { background: #fff; border: 1.5px solid #f0e6a0; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 10px; align-items: flex-start; }
.eureka-item-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.eureka-item-body { flex: 1; }
.eureka-item-text { font-size: 14px; color: #1a1a1a; line-height: 1.5; word-break: break-all; }
.eureka-item-date { font-size: 11px; color: #bbb; margin-top: 4px; }
.eureka-item-del { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.eureka-item-del:active { color: #E24B4A; }
.eureka-empty { font-size: 13px; color: #ccc; text-align: center; padding: 16px 0; }
</style>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; }
.container { max-width: 480px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
.date-str { font-size: 14px; color: #888; margin-bottom: 6px; }
.progress-label { font-size: 12px; color: #888; margin-bottom: 6px; }
.progress-bar-wrap { background: #e8e8e8; border-radius: 99px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar { height: 6px; border-radius: 99px; background: #1D9E75; transition: width 0.3s; }
.section-label { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }

.habits-today { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.habit-row { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 16px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; user-select: none; }
.habit-row:active { transform: scale(0.98); }
.habit-row.done { border-color: #1D9E75; background: #E1F5EE; }
.habit-row.med.done { border-color: #D85A30; background: #FAECE7; }
.habit-top { display: flex; align-items: center; gap: 12px; }
.habit-icon { font-size: 24px; flex-shrink: 0; }
.habit-info { flex: 1; }
.habit-name { font-size: 14px; font-weight: 500; color: #333; }
.habit-row.done .habit-name { color: #0F6E56; }
.habit-row.med.done .habit-name { color: #993C1D; }
.habit-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
.habit-row.done .habit-sub { color: #1D9E75; }
.habit-row.med.done .habit-sub { color: #D85A30; }
.check-circle { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #ccc; font-size: 14px; transition: all 0.15s; }
.habit-row.done .check-circle { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.habit-row.med.done .check-circle { background: #D85A30; border-color: #D85A30; color: #fff; }

.memo-area { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
.habit-row.done .memo-area { border-top-color: #d4edd6; }
.habit-row.med.done .memo-area { border-top-color: #f5c9b3; }
.memo-area textarea { width: 100%; border: 1px solid #e0e0e0; border-radius: 10px; padding: 8px 10px; font-size: 13px; color: #333; background: #fafafa; resize: none; outline: none; font-family: inherit; line-height: 1.5; }
.memo-area textarea::placeholder { color: #bbb; }
.memo-area textarea:focus { border-color: #1D9E75; background: #f0faf2; }
.habit-row.med .memo-area textarea:focus { border-color: #D85A30; background: #fff8f5; }

.timer-wrap { margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
.habit-row.done .timer-wrap { border-top-color: #d4edd6; }
.timer-display { font-size: 36px; font-weight: 600; color: #1D9E75; text-align: center; letter-spacing: 2px; margin-bottom: 10px; font-variant-numeric: tabular-nums; }
.timer-display.running { color: #1D9E75; }
.timer-display.paused  { color: #888; }
.timer-display.done-t  { color: #378ADD; }
.timer-btns { display: flex; gap: 8px; justify-content: center; }
.timer-btn { border: 1.5px solid #d4edd6; border-radius: 99px; padding: 7px 20px; font-size: 13px; font-weight: 500; cursor: pointer; background: #fff; color: #1D9E75; font-family: inherit; transition: all 0.15s; }
.timer-btn:active { transform: scale(0.96); }
.timer-btn.reset { color: #aaa; border-color: #e8e8e8; }

.time-badge { font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 500; margin-left: 6px; vertical-align: middle; }
.badge-morning { background: #FAEEDA; color: #854F0B; }
.badge-night   { background: #EEEDFE; color: #3C3489; }
.badge-eve     { background: #FAECE7; color: #993C1D; }
.badge-study   { background: #E6F1FB; color: #185FA5; }

/* 대학원 수업 통합 카드 */
.courses-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; }
.course-card { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 16px; padding: 14px 16px; transition: all 0.15s; }
.course-card.urgent { border-color: #E24B4A; background: #FCEBEB; }
.course-card.warn   { border-color: #EF9F27; background: #FAEEDA; }
.course-card.done-c { border-color: #1D9E75; background: #E1F5EE; }

.course-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
.course-icon { font-size: 22px; }
.course-title { flex: 1; font-size: 14px; font-weight: 500; color: #333; }
.course-card.done-c .course-title { color: #0F6E56; }
.course-card.urgent .course-title { color: #A32D2D; }
.course-card.warn .course-title   { color: #854F0B; }

.deadline-badge { font-size: 11px; padding: 3px 8px; border-radius: 99px; font-weight: 500; }
.deadline-ok     { background: #EAF3DE; color: #3B6D11; }
.deadline-urgent { background: #FCEBEB; color: #A32D2D; }
.deadline-warn   { background: #FAEEDA; color: #854F0B; }

.course-prog-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.course-prog-wrap { flex: 1; background: #f0f0f0; border-radius: 99px; height: 8px; overflow: hidden; }
.course-prog-bar  { height: 8px; border-radius: 99px; background: #378ADD; transition: width 0.3s; }
.course-card.done-c .course-prog-bar { background: #1D9E75; }
.course-card.urgent .course-prog-bar { background: #E24B4A; }
.course-card.warn   .course-prog-bar { background: #EF9F27; }
.course-pct { font-size: 12px; font-weight: 500; color: #378ADD; min-width: 36px; text-align: right; }
.course-card.done-c .course-pct { color: #1D9E75; }
.course-card.urgent .course-pct { color: #E24B4A; }
.course-card.warn   .course-pct { color: #EF9F27; }

.course-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.course-input-row label { font-size: 12px; color: #888; }
.lec-input { width: 52px; border: 1px solid #ddd; border-radius: 8px; padding: 5px 8px; font-size: 14px; font-weight: 500; color: #333; text-align: center; outline: none; font-family: inherit; }
.lec-input:focus { border-color: #378ADD; }
.lec-total { font-size: 13px; color: #aaa; }
.remain-text { font-size: 12px; color: #888; margin-left: auto; }

.course-check-row { display: flex; align-items: center; gap: 8px; padding-top: 10px; border-top: 1px solid #eee; cursor: pointer; }
.course-card.done-c .course-check-row { border-top-color: #d4edd6; }
.course-card.urgent .course-check-row { border-top-color: #f5c0c0; }
.course-check-box { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #ccc; flex-shrink: 0; transition: all 0.15s; }
.course-card.done-c .course-check-box { background: #1D9E75; border-color: #1D9E75; color: #fff; }
.course-check-label { font-size: 13px; color: #888; }
.course-card.done-c .course-check-label { color: #0F6E56; font-weight: 500; }

/* 캘린더 */
.month-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.month-title { font-size: 16px; font-weight: 500; color: #1a1a1a; flex: 1; }
.nav-btn { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 18px; color: #555; display: flex; align-items: center; justify-content: center; }
.cal-wrap { background: #fff; border-radius: 16px; padding: 14px; margin-bottom: 1.5rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-day-hd { font-size: 11px; color: #aaa; text-align: center; padding: 4px 0; }
.cal-cell { border-radius: 8px; padding: 5px 3px; min-height: 52px; background: #fafafa; }
.cal-cell.empty { background: none; }
.cal-cell.today { background: #EBF4FF; }
.date-num { font-size: 11px; color: #999; text-align: center; margin-bottom: 3px; }
.cal-cell.today .date-num { color: #378ADD; font-weight: 600; }
.dots { display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #e8e8e8; }

.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat-card { background: #fff; border-radius: 12px; padding: 12px 8px; text-align: center; }
.stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stat-sub { font-size: 11px; color: #bbb; margin-top: 2px; }
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #888; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

/* 시계 섹션 */
.clock-section { background: #1a1a1a; border-radius: 20px; margin-bottom: 1.5rem; overflow: hidden; }
.clock-tabs { display: flex; border-bottom: 1px solid #2e2e2e; }
.clock-tab { flex: 1; padding: 12px 4px; background: none; border: none; color: #888; font-size: 12px; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: color 0.15s; }
.clock-tab.active { color: #fff; border-bottom: 2px solid #378ADD; margin-bottom: -1px; }
.clock-tab span { font-size: 16px; }
.clock-panel { display: none; padding: 24px 20px 20px; }
.clock-panel.active { display: block; }

/* 시계 */
.clock-time { text-align: center; font-size: 52px; font-weight: 300; color: #fff; letter-spacing: -1px; font-variant-numeric: tabular-nums; }
.clock-time .sec { color: #378ADD; font-size: 36px; vertical-align: baseline; }
.clock-date { text-align: center; color: #888; font-size: 14px; margin-top: 6px; }
.clock-tz { text-align: center; color: #666; font-size: 12px; margin-bottom: 10px; }

/* 타이머(시계탭용) */
.ck-timer-display { text-align: center; font-size: 56px; font-weight: 300; color: #fff; letter-spacing: 2px; font-variant-numeric: tabular-nums; margin: 8px 0 20px; }
.ck-timer-display.running { color: #1D9E75; }
.ck-timer-display.done-t  { color: #378ADD; }
.ck-presets { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.ck-preset { background: #2e2e2e; border: none; border-radius: 99px; padding: 6px 14px; color: #ccc; font-size: 13px; cursor: pointer; font-family: inherit; }
.ck-preset:active { background: #3e3e3e; }
.ck-btns { display: flex; gap: 10px; justify-content: center; }
.ck-btn { border: none; border-radius: 50%; width: 64px; height: 64px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: transform 0.1s; }
.ck-btn:active { transform: scale(0.94); }
.ck-btn.start  { background: #1D9E75; color: #fff; }
.ck-btn.pause  { background: #EF9F27; color: #fff; }
.ck-btn.reset  { background: #2e2e2e; color: #aaa; }
.ck-btn.stop   { background: #E24B4A; color: #fff; }

/* 알람 */
.alarm-time-display { text-align: center; font-size: 48px; font-weight: 300; color: #fff; margin: 8px 0 16px; font-variant-numeric: tabular-nums; }
.alarm-set-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; }
.alarm-input { background: #2e2e2e; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 15px; padding: 8px 12px; width: 110px; outline: none; font-family: inherit; text-align: center; }
.alarm-add-btn { background: #378ADD; border: none; border-radius: 10px; color: #fff; font-size: 13px; font-weight: 500; padding: 9px 16px; cursor: pointer; font-family: inherit; }
.alarm-list { display: flex; flex-direction: column; gap: 8px; }
.alarm-item { background: #2e2e2e; border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
.alarm-item-time { font-size: 20px; font-weight: 400; color: #fff; flex: 1; font-variant-numeric: tabular-nums; }
.alarm-item-label { font-size: 12px; color: #888; }
.alarm-del { background: none; border: none; color: #555; font-size: 16px; cursor: pointer; }
.alarm-del:active { color: #E24B4A; }
.alarm-empty { text-align: center; color: #555; font-size: 13px; padding: 16px 0; }
.alarm-ring { color: #EF9F27 !important; }

/* 스톱워치 */
.sw-display { text-align: center; font-size: 52px; font-weight: 300; color: #fff; letter-spacing: 2px; font-variant-numeric: tabular-nums; margin: 8px 0 20px; }
.sw-display .sw-ms { font-size: 32px; color: #378ADD; }
.sw-laps { max-height: 140px; overflow-y: auto; margin-bottom: 12px; }
.sw-lap { display: flex; justify-content: space-between; font-size: 13px; color: #888; padding: 5px 0; border-bottom: 1px solid #2e2e2e; font-variant-numeric: tabular-nums; }
.sw-lap.best { color: #1D9E75; }
.sw-lap.worst { color: #E24B4A; }

/* 학사일정 아코디언 */
.accordion-wrap { margin-bottom: 1.5rem; }
.accordion-btn { width: 100%; background: #fff; border: 1.5px solid #e8e8e8; border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 500; color: #333; text-align: left; transition: all 0.15s; }
.accordion-btn:active { transform: scale(0.98); }
.accordion-btn.open { border-radius: 16px 16px 0 0; border-bottom-color: #f0f0f0; background: #f7f7f5; }
.accordion-arrow { margin-left: auto; font-size: 13px; color: #aaa; transition: transform 0.2s; }
.accordion-btn.open .accordion-arrow { transform: rotate(180deg); }
.accordion-body { display: none; background: #fff; border: 1.5px solid #e8e8e8; border-top: none; border-radius: 0 0 16px 16px; overflow: hidden; }
.accordion-body.open { display: block; }
.schedule-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.schedule-table th { background: #f7f7f5; color: #888; font-weight: 500; padding: 8px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
.schedule-table td { padding: 9px 12px; border-bottom: 1px solid #f7f7f5; color: #333; vertical-align: top; line-height: 1.5; }
.schedule-table tr:last-child td { border-bottom: none; }
.schedule-table tr.today-row td { background: #EBF4FF; color: #185FA5; font-weight: 500; }
.schedule-table tr.soon-row td { background: #FFF8E6; color: #854F0B; }
.schedule-sem-title { font-size: 13px; font-weight: 600; color: #333; padding: 10px 12px 6px; border-bottom: 1px solid #f0f0f0; }
.date-col { white-space: nowrap; color: #888; font-size: 11px; min-width: 110px; }
</style>
</head>
<body>
<div class="container">
  <h1>나의 습관 트래커</h1>
  <div class="date-str" id="dateStr"></div>
  <div class="progress-label" id="progressLabel"></div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <button class="eureka-fab" onclick="openEureka()" aria-label="아이디어 메모">💡</button>

  <div class="eureka-overlay" id="eurekaOverlay" onclick="closeEurekaIfBg(event)">
    <div class="eureka-sheet">
      <div class="eureka-sheet-header">
        <span style="font-size:22px">💡</span>
        <div class="eureka-sheet-title">유레카! 아이디어 캡처</div>
        <button class="eureka-close" onclick="closeEureka()">✕</button>
      </div>
      <textarea class="eureka-input" id="eurekaInput" rows="4" placeholder="지금 떠오른 아이디어를 적어보세요..."></textarea>
      <button class="eureka-save-btn" onclick="saveEureka()">저장하기</button>
    </div>
  </div>

  <!-- 시계 섹션 -->
  <div class="clock-section">
    <div class="clock-tabs">
      <button class="clock-tab active" onclick="switchTab('clock')"><span>🕐</span>시계</button>
      <button class="clock-tab" onclick="switchTab('timer')"><span>⏱</span>타이머</button>
      <button class="clock-tab" onclick="switchTab('alarm')"><span>🔔</span>알람</button>
      <button class="clock-tab" onclick="switchTab('stopwatch')"><span>⏲</span>스톱워치</button>
    </div>

    <!-- 시계 패널 -->
    <div class="clock-panel active" id="panel-clock">
      <div class="clock-tz">서울 · KST</div>
      <div class="clock-time"><span id="ck-h">00</span>:<span id="ck-m">00</span>:<span class="sec" id="ck-s">00</span></div>
      <div class="clock-date" id="ck-date"></div>
    </div>

    <!-- 타이머 패널 -->
    <div class="clock-panel" id="panel-timer">
      <div class="ck-timer-display" id="ck-timer-disp">00:00</div>
      <div class="ck-presets">
        <button class="ck-preset" onclick="ckTimerPreset(5)">5분</button>
        <button class="ck-preset" onclick="ckTimerPreset(10)">10분</button>
        <button class="ck-preset" onclick="ckTimerPreset(15)">15분</button>
        <button class="ck-preset" onclick="ckTimerPreset(20)">20분</button>
        <button class="ck-preset" onclick="ckTimerPreset(30)">30분</button>
      </div>
      <div class="ck-btns">
        <button class="ck-btn reset" onclick="ckTimerReset()">초기화</button>
        <button class="ck-btn start" id="ck-timer-btn" onclick="ckTimerToggle()">시작</button>
      </div>
    </div>

    <!-- 알람 패널 -->
    <div class="clock-panel" id="panel-alarm">
      <div class="alarm-time-display" id="alarm-now">00:00</div>
      <div class="alarm-set-row">
        <input class="alarm-input" type="time" id="alarm-input" value="07:00">
        <button class="alarm-add-btn" onclick="addAlarm()">+ 추가</button>
      </div>
      <div class="alarm-list" id="alarm-list"></div>
    </div>

    <!-- 스톱워치 패널 -->
    <div class="clock-panel" id="panel-stopwatch">
      <div class="sw-display"><span id="sw-disp">00:00</span><span class="sw-ms">.<span id="sw-ms">00</span></span></div>
      <div class="sw-laps" id="sw-laps"></div>
      <div class="ck-btns">
        <button class="ck-btn reset" onclick="swLap()" id="sw-lap-btn" style="font-size:12px">랩</button>
        <button class="ck-btn start" id="sw-btn" onclick="swToggle()">시작</button>
        <button class="ck-btn reset" onclick="swReset()">초기화</button>
      </div>
    </div>
  </div>

  <div class="section-label">🎓 대학원 학사일정</div>
  <div class="accordion-wrap">
    <button class="accordion-btn" id="scheduleBtn" onclick="toggleSchedule()">
      <span>📅</span> 2026학년도 가을학기 일정
      <span class="accordion-arrow">▼</span>
    </button>
    <div class="accordion-body" id="scheduleBody">
      <div class="schedule-sem-title">2026학년도 가을학기</div>
      <table class="schedule-table">
        <thead><tr><th class="date-col">일자</th><th>학사내용</th></tr></thead>
        <tbody id="scheduleTbody"></tbody>
      </table>
    </div>
  </div>

  <div class="section-label">오늘의 루틴</div>
  <div class="habits-today" id="habitCards"></div>

  <div class="section-label">📖 대학원 수업 진행률</div>
  <div class="courses-section" id="coursesSection"></div>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-title" id="monthTitle"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <div class="section-label">이달의 기록</div>
  <div class="legend" id="legend"></div>
  <div class="cal-wrap"><div class="cal-grid" id="calGrid"></div></div>
  <div class="section-label">이달 통계</div>
  <div class="stats" id="statsGrid"></div>

  <div class="section-label">💡 유레카 아이디어 목록</div>
  <div class="eureka-list-section" id="eurekaList"></div>
</div>

<script>
const HABITS = [
  { id:'oil',     name:'오전 공복 들기름 먹기', icon:'🫙', color:'#EF9F27', badge:'morning', badgeText:'아침',   memo:false, medClass:'',    memoPlaceholder:'' },
  { id:'yoga_am', name:'아침 요가 10분',         icon:'🧘', color:'#7F77DD', badge:'morning', badgeText:'아침',   memo:false, medClass:'',    memoPlaceholder:'' },
  { id:'reading', name:'도서관 30분 독서',        icon:'📚', color:'#1D9E75', badge:'',        badgeText:'',       memo:true,  medClass:'',    memoPlaceholder:'오늘 읽은 책에서 한 문장을 기록해 보세요...', timer:true },
  { id:'med',     name:'저녁 약먹기',             icon:'💊', color:'#D85A30', badge:'eve',     badgeText:'저녁',   memo:true,  medClass:'med', memoPlaceholder:'약 이름 또는 특이사항을 메모하세요...', timer:false },
  { id:'yoga_pm', name:'잠자기 전 요가 20분',     icon:'🌙', color:'#534AB7', badge:'night',   badgeText:'취침전', memo:false, medClass:'',    memoPlaceholder:'' },
];

const COURSES = [
  { id:'hack',   name:'보안해킹실습',   icon:'🔐', total:12, deadline:'2026-06-21' },
  { id:'expert', name:'보안전문가총론', icon:'🛡️', total:12, deadline:'2026-06-21' },
  { id:'module', name:'보안모듈구현',   icon:'⚙️', total:12, deadline:'2026-06-21' },
];

const DAYS = ['일','월','화','수','목','금','토'];
const WEEK_DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

let viewDate = new Date();
const today = new Date(); today.setHours(0,0,0,0);

function storageKey(d) { return `habit5_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; }
function memoKey(d,id)  { return `memo5_${id}_${d.getFullYear()}_${d.getMonth()+1}_${d.getDate()}`; }
function courseKey(id)  { return `course5_${id}`; }

function loadDay(d)  { try{const r=localStorage.getItem(storageKey(d));return r?JSON.parse(r):{};}catch{return{};} }
function saveDay(d,v){ try{localStorage.setItem(storageKey(d),JSON.stringify(v));}catch{} }
function loadMemo(id){ try{return localStorage.getItem(memoKey(today,id))||'';}catch{return'';} }
function saveMemo(id,v){ try{localStorage.setItem(memoKey(today,id),v);}catch{} }
function loadCourse(id){ try{const r=localStorage.getItem(courseKey(id));return r?JSON.parse(r):{done:0,checked:false};}catch{return{done:0,checked:false};} }
function saveCourse(id,v){ try{localStorage.setItem(courseKey(id),JSON.stringify(v));}catch{} }

let timerState = { remaining: 30*60, running: false, interval: null };

const SCHEDULE = [
  { s:'2026-07-27', e:'2026-08-02', text:'재입학 신청' },
  { s:'2026-07-30', e:'2026-08-06', text:'2026학년도 가을학기 재학생 등록금 납부' },
  { s:'2026-08-03', e:'2026-08-21', text:'2026학년도 가을학기 외국어시험 대체강좌 신청' },
  { s:'2026-08-03', e:'2026-08-21', text:'2026학년도 가을학기 외국어시험 면제 신청' },
  { s:'2026-08-22', e:'2026-08-22', text:'2025후기 학위기준일' },
  { s:'2026-08-31', e:'2026-08-31', text:'2026학년도 가을학기 개강' },
  { s:'2026-08-27', e:'2026-09-02', text:'2026학년도 가을학기 추가수강신청' },
  { s:'2026-08-27', e:'2026-09-02', text:'2026학년도 가을학기 선수과목 인정신청(추가)' },
  { s:'2026-09-03', e:'2026-09-09', text:'2026학년도 가을학기 외국어시험 신청' },
  { s:'2026-09-03', e:'2026-09-10', text:'2026학년도 가을학기 재학생 미등록자 추가납부' },
  { s:'2026-09-10', e:'2026-09-16', text:'2026학년도 가을학기 외국어시험 응시료 납부' },
  { s:'2026-09-19', e:'2026-09-19', text:'2026학년도 가을학기 외국어시험' },
  { s:'2026-09-29', e:'2026-09-29', text:'등록금 반환 기준 5/6선' },
  { s:'2026-10-12', e:'2026-10-18', text:'2026학년도 가을학기 중간고사' },
  { s:'2026-10-20', e:'2026-10-26', text:'2026학년도 가을학기 종합시험 신청' },
  { s:'2026-10-27', e:'2026-11-21', text:'2026학년도 가을학기 종합시험 강의열람' },
  { s:'2026-10-29', e:'2026-10-29', text:'등록금 반환 기준 2/3선' },
  { s:'2026-11-20', e:'2026-11-21', text:'2026학년도 가을학기 종합시험' },
  { s:'2026-11-28', e:'2026-11-28', text:'등록금 반환 기준 1/2선' },
  { s:'2026-12-07', e:'2026-12-13', text:'2026학년도 가을학기 기말고사' },
  { s:'2026-12-13', e:'2026-12-13', text:'2026학년도 가을학기 종강일' },
  { s:'2026-12-25', e:'2026-12-28', text:'2026학년도 가을학기 성적열람 및 이의신청' },
];

function toggleSchedule() {
  const btn = document.getElementById('scheduleBtn');
  const body = document.getElementById('scheduleBody');
  btn.classList.toggle('open');
  body.classList.toggle('open');
}

function formatDateRange(s, e) {
  const fmt = d => { const x=new Date(d); return `${x.getMonth()+1}/${x.getDate()}`; };
  return s===e ? fmt(s) : `${fmt(s)} ~ ${fmt(e)}`;
}

function renderSchedule() {
  const now = today.getTime();
  const soon = today.getTime() + 7*86400000;
  const tbody = document.getElementById('scheduleTbody');
  tbody.innerHTML = SCHEDULE.map(row => {
    const sd = new Date(row.s).getTime(), ed = new Date(row.e).getTime() + 86400000;
    const isCurrent = now >= sd && now < ed;
    const isSoon = !isCurrent && sd > now && sd <= soon;
    const cls = isCurrent ? 'today-row' : isSoon ? 'soon-row' : '';
    const badge = isCurrent ? ' 🔵' : isSoon ? ' 🟡' : '';
    return `<tr class="${cls}">
      <td class="date-col">${formatDateRange(row.s, row.e)}</td>
      <td>${row.text}${badge}</td>
    </tr>`;
  }).join('');
}

function eurekaStoreKey() { return 'eureka5_ideas'; }
function loadIdeas() { try { const r=localStorage.getItem(eurekaStoreKey()); return r?JSON.parse(r):[]; } catch { return []; } }
function saveIdeas(arr) { try { localStorage.setItem(eurekaStoreKey(), JSON.stringify(arr)); } catch {} }

function openEureka() {
  document.getElementById('eurekaOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('eurekaInput').focus(), 100);
}
function closeEureka() { document.getElementById('eurekaOverlay').classList.remove('open'); document.getElementById('eurekaInput').value=''; }
function closeEurekaIfBg(e) { if(e.target===document.getElementById('eurekaOverlay')) closeEureka(); }
function saveEureka() {
  const val = document.getElementById('eurekaInput').value.trim();
  if (!val) return;
  const ideas = loadIdeas();
  const now = new Date();
  ideas.unshift({ text: val, date: `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, id: Date.now() });
  saveIdeas(ideas);
  closeEureka();
  renderEureka();
}
function deleteIdea(id) {
  const ideas = loadIdeas().filter(x=>x.id!==id);
  saveIdeas(ideas); renderEureka();
}
function renderEureka() {
  const ideas = loadIdeas();
  const el = document.getElementById('eurekaList');
  if (!ideas.length) { el.innerHTML=`<div class="eureka-empty">아직 기록된 아이디어가 없어요</div>`; return; }
  el.innerHTML = ideas.map(i=>`<div class="eureka-item">
    <div class="eureka-item-icon">💡</div>
    <div class="eureka-item-body">
      <div class="eureka-item-text">${i.text}</div>
      <div class="eureka-item-date">${i.date}</div>
    </div>
    <button class="eureka-item-del" onclick="deleteIdea(${i.id})">✕</button>
  </div>`).join('');
}

function timerTick() {
  if (timerState.remaining <= 0) {
    clearInterval(timerState.interval); timerState.running = false;
    updateTimerUI(); return;
  }
  timerState.remaining--; updateTimerUI();
}
function timerToggle(e) {
  e.stopPropagation();
  if (timerState.remaining <= 0) return;
  if (timerState.running) {
    clearInterval(timerState.interval); timerState.running = false;
  } else {
    timerState.interval = setInterval(timerTick, 1000); timerState.running = true;
  }
  updateTimerUI();
}
function timerReset(e) {
  e.stopPropagation();
  clearInterval(timerState.interval);
  timerState = { remaining: 30*60, running: false, interval: null };
  updateTimerUI();
}
function updateTimerUI() {
  const el = document.getElementById('timer-display');
  const btn = document.getElementById('timer-toggle-btn');
  if (!el || !btn) return;
  const m = Math.floor(timerState.remaining / 60);
  const s = timerState.remaining % 60;
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const finished = timerState.remaining <= 0;
  el.className = 'timer-display ' + (finished ? 'done-t' : timerState.running ? 'running' : 'paused');
  btn.textContent = finished ? '완료 ✓' : timerState.running ? '일시정지' : (timerState.remaining < 30*60 ? '계속하기' : '시작');
}

function getStreak(id) {
  let s=0,d=new Date(today);
  while(true){if(loadDay(d)[id]){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}
function toggleHabit(id){ const d=loadDay(today);d[id]=!d[id];saveDay(today,d);render();
renderEureka();
renderSchedule();
window.renderAlarms(); }
function changeMonth(delta){ viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+delta,1);render(); }

function updateCourseLec(id,val){
  const c=loadCourse(id), course=COURSES.find(x=>x.id===id);
  c.done=Math.max(0,Math.min(course.total,parseInt(val)||0));
  saveCourse(id,c); renderCourses();
}
function toggleCourseCheck(id){
  const c=loadCourse(id); c.checked=!c.checked; saveCourse(id,c); renderCourses();
  const d=loadDay(today); d['study']=COURSES.some(x=>loadCourse(x.id).checked); saveDay(today,d); render();
}

function daysLeft(dl){ const d=new Date(dl);d.setHours(0,0,0,0);return Math.ceil((d-today)/86400000); }

function renderCourses(){
  document.getElementById('coursesSection').innerHTML=COURSES.map(c=>{
    const data=loadCourse(c.id);
    const done=data.done||0, checked=!!data.checked;
    const pct=Math.round(done/c.total*100);
    const left=daysLeft(c.deadline);
    const remain=c.total-done;
    const cls=checked?'done-c':left<=2?'urgent':left<=7?'warn':'';
    const badgeCls=left<=2?'deadline-urgent':left<=7?'deadline-warn':'deadline-ok';
    const badgeText=left<0?'마감 초과!':left===0?'D-Day':`D-${left}`;
    const remainText=remain<=0?'완강 🎉':`남은 ${remain}강`;
    return `<div class="course-card ${cls}">
      <div class="course-top" onclick="toggleCourseCheck('${c.id}')">
        <div class="course-icon">${c.icon}</div>
        <div class="course-title">${c.name}</div>
        <span class="deadline-badge ${badgeCls}">${badgeText}</span>
      </div>
      <div class="course-prog-row">
        <div class="course-prog-wrap"><div class="course-prog-bar" style="width:${pct}%"></div></div>
        <div class="course-pct">${pct}%</div>
      </div>
      <div class="course-input-row" onclick="event.stopPropagation()">
        <label>완료 강의</label>
        <input class="lec-input" type="number" min="0" max="${c.total}" value="${done}"
          onchange="updateCourseLec('${c.id}',this.value)"
          oninput="updateCourseLec('${c.id}',this.value)">
        <span class="lec-total">/ ${c.total}강</span>
        <span class="remain-text">${remainText}</span>
      </div>
      <div class="course-check-row" onclick="toggleCourseCheck('${c.id}')">
        <div class="course-check-box">${checked?'✓':''}</div>
        <div class="course-check-label">${checked?'오늘 30분 수강 완료':'오늘 30분 수강했나요?'}</div>
      </div>
    </div>`;
  }).join('');
}

function render(){
  const yr=viewDate.getFullYear(), mo=viewDate.getMonth();
  const todayData=loadDay(today);
  const studyDone=COURSES.some(x=>loadCourse(x.id).checked);
  if(studyDone) todayData['study']=true;
  const allIds=[...HABITS.map(h=>h.id),'study'];
  const uniqueIds=[...new Set(allIds)];
  const doneCount=HABITS.filter(h=>todayData[h.id]).length + (studyDone?0:0);
  const habitDone=HABITS.filter(h=>todayData[h.id]).length;
  const total=HABITS.length;
  const pct=Math.round(habitDone/total*100);

  document.getElementById('dateStr').textContent=
    `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 ${WEEK_DAYS[today.getDay()]}`;
  document.getElementById('progressLabel').textContent=`오늘 루틴 진행률 ${habitDone}/${total} (${pct}%)`;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('monthTitle').textContent=`${yr}년 ${mo+1}월`;

  document.getElementById('habitCards').innerHTML=HABITS.map(h=>{
    const done=!!todayData[h.id], streak=getStreak(h.id);
    const badge=h.badge?`<span class="time-badge badge-${h.badge}">${h.badgeText}</span>`:'';
    const memoVal=h.memo?loadMemo(h.id):'';
    const timerMin = h.timerMin || 30;
    const timerHtml = h.timer ? `<div class="timer-wrap" onclick="event.stopPropagation()">
        <div id="timer-display-${h.id}" class="timer-display paused">${String(timerMin).padStart(2,'0')}:00</div>
        <div class="timer-btns">
          <button id="timer-toggle-btn-${h.id}" class="timer-btn" onclick="timerToggle(event,'${h.id}',${timerMin})">시작</button>
          <button class="timer-btn reset" onclick="timerReset(event,'${h.id}',${timerMin})">초기화</button>
        </div>
      </div>` : '';
    const memoHtml=`<div class="memo-area" onclick="event.stopPropagation()">
        <textarea rows="2" placeholder="${h.memo?h.memoPlaceholder:'메모'}"
          ${!h.memo?'style="display:none"':''}
          onchange="saveMemo('${h.id}',this.value)"
          oninput="saveMemo('${h.id}',this.value)"
        >${memoVal}</textarea>
      </div>`;
    return `<div class="habit-row ${h.medClass} ${done?'done':''}" onclick="toggleHabit('${h.id}')">
      <div class="habit-top">
        <div class="habit-icon">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}${badge}</div>
          <div class="habit-sub">${done?(streak+'일 연속 달성'):''}</div>
        </div>
        <div class="check-circle">${done?'✓':''}</div>
      </div>${h.timer?timerHtml:''}${h.memo?memoHtml:''}
    </div>`;
  }).join('');

  renderCourses();

  document.getElementById('legend').innerHTML=HABITS.map(h=>
    `<div class="legend-item"><div class="legend-dot" style="background:${h.color}"></div>${h.icon}</div>`
  ).join('');

  const first=new Date(yr,mo,1).getDay(), daysInMonth=new Date(yr,mo+1,0).getDate();
  let html=DAYS.map(d=>`<div class="cal-day-hd">${d}</div>`).join('');
  for(let i=0;i<first;i++) html+=`<div class="cal-cell empty"></div>`;
  let totals=HABITS.map(()=>0);
  for(let day=1;day<=daysInMonth;day++){
    const d=new Date(yr,mo,day);d.setHours(0,0,0,0);
    const isToday=d.getTime()===today.getTime(), data=loadDay(d);
    const dots=HABITS.map((h,i)=>{ if(data[h.id])totals[i]++; return `<div class="dot" style="${data[h.id]?'background:'+h.color:''}"></div>`; }).join('');
    html+=`<div class="cal-cell ${isToday?'today':''}"><div class="date-num">${day}</div><div class="dots">${dots}</div></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;

  document.getElementById('statsGrid').innerHTML=HABITS.map((h,i)=>{
    const p=Math.round(totals[i]/daysInMonth*100);
    return `<div class="stat-card"><div class="stat-label">${h.icon}</div><div class="stat-value">${p}%</div><div class="stat-sub">${totals[i]}/${daysInMonth}일</div></div>`;
  }).join('');
}
render();
</script>
